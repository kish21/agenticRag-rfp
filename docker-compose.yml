services:
  postgres:
    image: postgres:15
    container_name: platform_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agenticplatform}
      POSTGRES_USER: ${POSTGRES_USER:-platformuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platformpass2026}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-platformuser} -d ${POSTGRES_DB:-agenticplatform}']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: platform_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres

  qdrant:
    image: qdrant/qdrant:latest
    container_name: platform_qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:6333/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: platform_prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: platform_loki
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: platform_grafana
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
