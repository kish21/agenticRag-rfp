services:
  postgres:
    image: postgres:15
    container_name: platform_postgres
    environment:
      POSTGRES_DB: agenticplatform
      POSTGRES_USER: platformuser
      POSTGRES_PASSWORD: platformpass2026
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platformuser -d agenticplatform']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: platform_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres

  qdrant:
    image: qdrant/qdrant:latest
    container_name: platform_qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:6333/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
