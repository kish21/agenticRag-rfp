name: CI

# Runs on every push and on every PR targeting master
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 0: Secret scan ───────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    # gitleaks-action@v2 lists the PR's commits via the GitHub API to scope its
    # scan range; on pull_request events that needs pull-requests:read. Without
    # an explicit block the job inherits the repo default (contents:read only)
    # and the action crashes on a 403 — a red "secret scan" with no real leak.
    # Least-privilege: only the two scopes the action actually uses.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks scans all commits
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ── Job 0b: Dependency vulnerability scan (SC-002, #120) ─────────────────
  # Scans the pinned Python dependencies for known CVEs on every push/PR via
  # pip-audit (PyPA's Advisory Database). Fail-closed: any known vulnerability
  # fails the job, matching the project's security baseline. If a transitive
  # vuln with no available fix appears, triage it and add its ID to the
  # `ignore-vulns` list below (config in source, never a silent skip).
  # NOTE: the action reads its own `ignore-vulns:` input — passing --ignore-vuln
  # via extra-args is NOT honoured. Least-privilege token: this job only reads code.
  dependency-audit:
    name: Dependency CVE scan (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: pip-audit (requirements + dev requirements)
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt requirements-dev.txt
          # Justified ignores — the only CVEs with no actionable fix in our context.
          # Each is tracked; revisit when a fix ships / pytest is upgraded / we leave python-jose.
          # (The two transformers CVEs are GONE: sentence-transformers moved to the optional
          #  requirements-local.txt, so transformers/torch no longer ship in the audited set.)
          #  PYSEC-2025-185  python-jose JWE-bomb DoS — no fix; we use HS256 JWS only,
          #                  never jwe.decrypt, so it is not reachable.
          #  CVE-2026-30922  pyasn1 BER-decoder recursion DoS — fix (0.6.3) blocked by
          #                  python-jose's pyasn1<0.5.0 cap. Not reachable: HS256 (HMAC)
          #                  never parses ASN.1; pyasn1 is only used by the rsa/asymmetric
          #                  path we don't exercise. (Real fix = migrate off python-jose, #222.)
          #  CVE-2025-71176  pytest — dev/test-only, never in the production image;
          #                  fix needs the deferred pytest 9 bump (#221).
          ignore-vulns: |
            PYSEC-2025-185
            CVE-2026-30922
            CVE-2025-71176

  # ── Job 1: Frontend build ────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Next.js build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint (eslint, errors only)
        # Phase 3 post-audit (2026-05-29): block PRs that introduce new
        # React 19 hook errors (set-state-in-effect, impure-fn-in-render,
        # TDZ). Warnings still allowed; only errors fail the job.
        run: cd frontend && npx eslint . --max-warnings 100

      - name: Build Next.js
        run: cd frontend && npm run build

  # ── Job 2: Frontend quality gates (file scanners — no services needed) ───
  frontend-checks:
    name: Frontend — checkpoint + drift scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run frontend drift detector
        run: python tools/frontend_drift_detector.py

      - name: Run frontend checkpoint runner
        run: python tools/frontend_checkpoint_runner.py run BUILD THEME RESPONSIVE AUTH FORMS A11Y SECURITY

  # ── Job 3: Backend unit tests ────────────────────────────────────────────
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest

    # Phase 5 (background ingestion) added 47 tests that exercise live
    # PostgreSQL via app.db.fact_store. Provide a postgres service so they
    # can connect. Credentials + DB name match the app/config defaults so
    # the test code does not need any CI-specific overrides.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: platformuser
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: agenticplatform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platformuser -d agenticplatform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        # Phase 1 split dev tooling (pytest, faker, grandalf) into
        # requirements-dev.txt so production images stay lean. Pytest jobs
        # must install BOTH files; production jobs install only requirements.txt.
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Generate platform_app role password
        # Generated at runtime — no DB credential lives in the repo. Persisted
        # to the job env so the schema bootstrap and the tests use the same value.
        run: echo "PG_APP_PW=$(openssl rand -hex 16)" >> "$GITHUB_ENV"

      - name: Create minimal .env for tests
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://platformuser:ci-password@localhost:5432/agenticplatform
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          POSTGRES_DB=agenticplatform
          POSTGRES_USER=platformuser
          POSTGRES_PASSWORD=ci-password
          POSTGRES_APP_USER=platform_app
          QDRANT_URL=http://localhost:6333
          SECRET_KEY=ci-test-secret-key-not-real
          LLM_PROVIDER=openai
          OPENAI_API_KEY=sk-fake-key-for-import-testing
          EMBEDDING_PROVIDER=local
          LANGFUSE_PUBLIC_KEY=fake
          LANGFUSE_SECRET_KEY=fake
          LANGFUSE_HOST=http://localhost
          EOF
          echo "POSTGRES_APP_PASSWORD=$PG_APP_PW" >> .env

      - name: Bootstrap schema + mark Alembic state
        # The repo has both app/db/schema.sql (declarative, CREATE TABLE IF
        # NOT EXISTS) and alembic/versions/*.py (incremental). They have
        # drifted historically — schema.sql owns the full state today, while
        # individual migrations only cover deltas added after their cut date.
        # Dev environments bootstrap via schema.sql, not by replaying all
        # migrations from 0001. Mirror that here so CI sees the same shape.
        # -v app_pw=... supplies the platform_app password (no literal in SQL).
        env:
          PGPASSWORD: ci-password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U platformuser -d agenticplatform \
            -v app_pw="$PG_APP_PW" -f app/db/schema.sql
          PYTHONPATH=. alembic stamp head

      - name: Run pytest
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: agenticplatform
          POSTGRES_USER: platformuser
          POSTGRES_PASSWORD: ci-password
          # Non-superuser app role (created by schema.sql) that RLS governs.
          # The tenant-isolation test connects as this role. The password is
          # read from the $PG_APP_PW shell var (set via $GITHUB_ENV in an
          # earlier step) on the run line — avoids a ${{ env }} expression the
          # workflow linter can't statically resolve.
          POSTGRES_APP_USER: platform_app
        run: POSTGRES_APP_PASSWORD="$PG_APP_PW" PYTHONPATH=. pytest tests/ -v --tb=short --ignore=tests/regression --ignore=tests/integration

  # ── Job 4: Backend contract tests (no services needed — import-only) ─────
  backend-contracts:
    name: Backend — contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create minimal .env for imports
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://user:pass@localhost/db
          QDRANT_URL=http://localhost:6333
          SECRET_KEY=ci-test-secret-key-not-real
          LLM_PROVIDER=openai
          OPENAI_API_KEY=sk-fake-key-for-import-testing
          EMBEDDING_PROVIDER=local
          LANGFUSE_PUBLIC_KEY=fake
          LANGFUSE_SECRET_KEY=fake
          LANGFUSE_HOST=http://localhost
          EOF

      - name: Run contract tests
        run: PYTHONPATH=. python tools/contract_tests.py
