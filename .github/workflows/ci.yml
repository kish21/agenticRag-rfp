name: CI

# Runs on every push and on every PR targeting master
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: Frontend build ────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Next.js build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint (eslint, errors only)
        # Phase 3 post-audit (2026-05-29): block PRs that introduce new
        # React 19 hook errors (set-state-in-effect, impure-fn-in-render,
        # TDZ). Warnings still allowed; only errors fail the job.
        run: cd frontend && npx eslint . --max-warnings 100

      - name: Build Next.js
        run: cd frontend && npm run build

  # ── Job 2: Frontend quality gates (file scanners — no services needed) ───
  frontend-checks:
    name: Frontend — checkpoint + drift scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run frontend drift detector
        run: python tools/frontend_drift_detector.py

      - name: Run frontend checkpoint runner
        run: python tools/frontend_checkpoint_runner.py run BUILD THEME RESPONSIVE AUTH FORMS A11Y SECURITY

  # ── Job 3: Backend unit tests ────────────────────────────────────────────
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest

    # Phase 5 (background ingestion) added 47 tests that exercise live
    # PostgreSQL via app.db.fact_store. Provide a postgres service so they
    # can connect. Credentials + DB name match the app/config defaults so
    # the test code does not need any CI-specific overrides.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: platformuser
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: agenticplatform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platformuser -d agenticplatform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        # Phase 1 split dev tooling (pytest, faker, grandalf) into
        # requirements-dev.txt so production images stay lean. Pytest jobs
        # must install BOTH files; production jobs install only requirements.txt.
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Create minimal .env for tests
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://platformuser:ci-password@localhost:5432/agenticplatform
          POSTGRES_HOST=localhost
          POSTGRES_PORT=5432
          POSTGRES_DB=agenticplatform
          POSTGRES_USER=platformuser
          POSTGRES_PASSWORD=ci-password
          POSTGRES_APP_USER=platform_app
          POSTGRES_APP_PASSWORD=platform_app_pass2026
          QDRANT_URL=http://localhost:6333
          SECRET_KEY=ci-test-secret-key-not-real
          LLM_PROVIDER=openai
          OPENAI_API_KEY=sk-fake-key-for-import-testing
          EMBEDDING_PROVIDER=local
          LANGFUSE_PUBLIC_KEY=fake
          LANGFUSE_SECRET_KEY=fake
          LANGFUSE_HOST=http://localhost
          EOF

      - name: Bootstrap schema + mark Alembic state
        # The repo has both app/db/schema.sql (declarative, CREATE TABLE IF
        # NOT EXISTS) and alembic/versions/*.py (incremental). They have
        # drifted historically — schema.sql owns the full state today, while
        # individual migrations only cover deltas added after their cut date.
        # Dev environments bootstrap via schema.sql, not by replaying all
        # migrations from 0001. Mirror that here so CI sees the same shape.
        env:
          PGPASSWORD: ci-password
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          psql -h localhost -U platformuser -d agenticplatform -f app/db/schema.sql
          PYTHONPATH=. alembic stamp head

      - name: Run pytest
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: agenticplatform
          POSTGRES_USER: platformuser
          POSTGRES_PASSWORD: ci-password
          # Non-superuser app role (created by schema.sql) that RLS governs.
          # The tenant-isolation test connects as this role; password must match
          # the literal in app/db/schema.sql.
          POSTGRES_APP_USER: platform_app
          POSTGRES_APP_PASSWORD: platform_app_pass2026
        run: PYTHONPATH=. pytest tests/ -v --tb=short --ignore=tests/regression --ignore=tests/integration

  # ── Job 4: Backend contract tests (no services needed — import-only) ─────
  backend-contracts:
    name: Backend — contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create minimal .env for imports
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://user:pass@localhost/db
          QDRANT_URL=http://localhost:6333
          SECRET_KEY=ci-test-secret-key-not-real
          LLM_PROVIDER=openai
          OPENAI_API_KEY=sk-fake-key-for-import-testing
          EMBEDDING_PROVIDER=local
          LANGFUSE_PUBLIC_KEY=fake
          LANGFUSE_SECRET_KEY=fake
          LANGFUSE_HOST=http://localhost
          EOF

      - name: Run contract tests
        run: PYTHONPATH=. python tools/contract_tests.py
