name: CI

# Runs on every push and on every PR targeting master
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: Frontend build ────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Next.js build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build Next.js
        run: cd frontend && npm run build

  # ── Job 2: Frontend quality gates (file scanners — no services needed) ───
  frontend-checks:
    name: Frontend — checkpoint + drift scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run frontend drift detector
        run: python tools/frontend_drift_detector.py

      - name: Run frontend checkpoint runner
        run: python tools/frontend_checkpoint_runner.py run BUILD THEME RESPONSIVE AUTH FORMS A11Y SECURITY

  # ── Job 3: Backend unit tests ────────────────────────────────────────────
  backend-tests:
    name: Backend — pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create minimal .env for tests
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://user:pass@localhost/db
          QDRANT_URL=http://localhost:6333
          SECRET_KEY=ci-test-secret-key-not-real
          LLM_PROVIDER=openai
          OPENAI_API_KEY=sk-fake-key-for-import-testing
          EMBEDDING_PROVIDER=local
          LANGFUSE_PUBLIC_KEY=fake
          LANGFUSE_SECRET_KEY=fake
          LANGFUSE_HOST=http://localhost
          EOF

      - name: Run pytest
        run: PYTHONPATH=. pytest tests/ -v --tb=short --ignore=tests/regression --ignore=tests/integration

  # ── Job 4: Backend contract tests (no services needed — import-only) ─────
  backend-contracts:
    name: Backend — contract tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create minimal .env for imports
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=postgresql://user:pass@localhost/db
          QDRANT_URL=http://localhost:6333
          SECRET_KEY=ci-test-secret-key-not-real
          LLM_PROVIDER=openai
          OPENAI_API_KEY=sk-fake-key-for-import-testing
          EMBEDDING_PROVIDER=local
          LANGFUSE_PUBLIC_KEY=fake
          LANGFUSE_SECRET_KEY=fake
          LANGFUSE_HOST=http://localhost
          EOF

      - name: Run contract tests
        run: PYTHONPATH=. python tools/contract_tests.py
        continue-on-error: true  # contract tests may need services; don't block on first run
