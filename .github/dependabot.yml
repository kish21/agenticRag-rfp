# Dependabot keeps dependencies patched so CVE fixes land as PRs automatically,
# complementing the pip-audit CI gate (SC-002, #120). Weekly cadence keeps noise low.
version: 2
updates:
  # Python backend
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"

  # Frontend (Next.js)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Group tightly-coupled packages so they bump together in ONE PR. Bumping
    # them independently drifts versions apart and breaks the build:
    #   - react / react-dom must share a version (Next refuses a mismatch — see #237)
    #   - eslint must move with eslint-config-next (peer-dep compatibility — see #236)
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      eslint:
        patterns:
          - "eslint"
          - "eslint-config-next"
          - "@eslint/*"
      next:
        patterns:
          - "next"
          - "@next/*"
    labels:
      - "dependencies"
      - "frontend"

  # GitHub Actions used in CI workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
