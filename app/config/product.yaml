# Phase 5: RFP lifecycle defaults applied when the procurement user does
# not explicitly choose. Product can rebalance without engineering.
rfp_defaults:
  default_deadline_days: 14
  default_autonomy_mode: auto_to_evaluate
  allowed_autonomy_modes: [manual, auto_to_evaluate, auto_to_report]
  write_roles: [platform_admin, company_admin, department_admin, department_user]

# RBAC — #55. Roles permitted to read the org-wide audit trail
# (GET /api/v1/audit/access-log + /events). Read-only compliance surface;
# the `auditor` role is read-only and deliberately NOT in write_roles above.
# Product can widen/narrow this set without an engineering change.
rbac:
  audit_read_roles: [auditor, company_admin, platform_admin]

# Defaults applied to brand-new orgs. Existing orgs keep their
# org_settings row unchanged.
new_org_defaults:
  quality_tier: balanced
  output_tone: formal
  output_language: en-GB
  citation_style: inline
  include_confidence_score: true
  include_evidence_quotes: true
  max_evidence_quote_chars: 300
  score_variance_threshold: 0.15
  rank_margin_threshold: 3
  parallel_vendors: true

# Three named quality tiers. Each maps to a coherent set of retrieval
# and confidence flags. Product can rebalance these without engineering.
presets:
  # All three tiers are identical for now.
  # Differentiation (cost, quality, speed trade-offs) to be configured later
  # when real customer usage data informs the right thresholds.
  fast:
    label: "Fast"
    summary: "Full retrieval pipeline with BGE reranking and hybrid search."
    cost_multiplier: 1.0
    config: &unified_config
      use_hyde: true
      use_reranking: true
      use_query_rewriting: true
      use_hybrid_search: true
      # NOTE: the reranker BACKEND (bge/modal/cohere/none) is deliberately NOT set
      # here. It is a deployment concern, not a quality-tier one, so it is sourced
      # from the operator's .env RERANKER_PROVIDER in domain/org_settings._defaults_for.
      # Pinning it in the preset previously made .env dead config and forced a local
      # HuggingFace download in air-gapped VPCs (silent degrade to vector order). See
      # docs/dev/E212_RERANKER_AIRGAPPED_DEFAULT.md.
      retrieval_top_k: 10
      rerank_top_n: 5
      mandatory_check_use_llm_verify: true
      confidence_retry_threshold: 0.75
      llm_temperature: 0.1

  balanced:
    label: "Balanced"
    summary: "Full retrieval pipeline with BGE reranking and hybrid search."
    cost_multiplier: 1.0
    config: *unified_config

  accurate:
    label: "Accurate"
    summary: "Full retrieval pipeline with BGE reranking and hybrid search."
    cost_multiplier: 1.0
    config: *unified_config

# Score -> recommendation band mapping
score_bands:
  strongly_recommended: 85
  recommended: 70
  acceptable: 50
  marginal: 0

# Audit retention
audit:
  retain_decisions_years: 7
  require_human_signoff: true
  citation_required: true

# GDPR data-subject rights (issue #119)
# Mode B — tenant erasure (offboarding wipe). All values defaulted so older
# product.yaml files keep loading.
gdpr:
  # Keep a retained, anonymized erasure receipt (org_id + requester + counts,
  # no PII) as proof the wipe happened. Survives the org delete (audit_log has
  # no FK to organisations). Art. 17(3) — proof of compliant erasure.
  keep_erasure_receipt: true
  # Refuse a tenant wipe while any of the org's runs is still 'running' — a
  # wipe mid-pipeline would orphan an in-flight evaluation. 409 if violated.
  block_if_runs_in_flight: true
