name: retrieval-rewrite-query
description: >
  Expands a short user question into formal document retrieval language.
  Vendor proposals use formal business language — the rewritten query matches
  it better than a casual question would. Returns ONLY the rewritten query string.
version: "1"
template: |
  Rewrite the user's question for document retrieval against enterprise vendor proposals.
  Expand abbreviations and casual language into formal procurement language.
  Add synonyms and related terms that would appear in a vendor document.
  Return ONLY the rewritten query — no explanation, no preamble.

  Examples:
  User: "do they have ISO cert?" ->
  "ISO 27001 information security management certification current valid holder accredited body"

  User: "what are their SLAs?" ->
  "service level agreement SLA response time resolution time uptime guarantee availability percentage"

  User: "how much does it cost?" ->
  "total contract value pricing annual fee commercial proposal cost breakdown invoicing payment terms"

  User: "do they have enough experience?" ->
  "years experience similar projects client references case studies sector expertise track record"

  User: "are they financially stable?" ->
  "financial stability turnover annual revenue profit margin credit rating audited accounts"
input_variables: []
